<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 680" width="100%" height="100%" style="background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <text x="50" y="60" font-size="22" font-weight="700" fill="#2C3E50">Scenario 3 - 150 Unreserved Concurrency Spike</text>

  <!-- Y axis -->
  <line x1="120" y1="100" x2="120" y2="470" stroke="#2C3E50" stroke-width="2" />
  <!-- X axis -->
  <line x1="120" y1="470" x2="720" y2="470" stroke="#2C3E50" stroke-width="2" />

  <!-- Y-axis: 0..1,100 -> 470..85.5. Unit = 0.35 px/concurrency (matches example2-a).
       y(v) = 470 - v*0.35
       200 -> 400, 400 -> 330, 600 -> 260, 800 -> 190, 1000 -> 120 -->
  <g font-size="14" fill="#555" text-anchor="end">
    <text x="105" y="475">0</text>
    <text x="105" y="405">200</text>
    <text x="105" y="335">400</text>
    <text x="105" y="265">600</text>
    <text x="105" y="195">800</text>
    <text x="105" y="125">1,000</text>
  </g>
  <g stroke="#2C3E50" stroke-width="1">
    <line x1="115" y1="400" x2="120" y2="400" />
    <line x1="115" y1="330" x2="120" y2="330" />
    <line x1="115" y1="260" x2="120" y2="260" />
    <line x1="115" y1="190" x2="120" y2="190" />
    <line x1="115" y1="120" x2="120" y2="120" />
  </g>

  <!-- Account limit dashed line at y=120 (1,000) spans both bars -->
  <line x1="120" y1="120" x2="720" y2="120" stroke="#2C3E50" stroke-width="2" stroke-dasharray="6,4" />

  <!-- =====================================================================
       BAR 1 — Before spike (Claimed = 960)
       x range: 180..340, center 260
       RC(A)=400: y=330..470
       RC(B)=400: y=190..330
       PC(C)=100: y=155..190
       UR=60:     y=134..155
       ===================================================================== -->
  <g stroke="#ffffff" stroke-width="1.5">
    <rect x="180" y="330" width="160" height="140" fill="#8C9298" />
    <rect x="180" y="190" width="160" height="140" fill="#A8ADb3" />
    <rect x="180" y="155" width="160" height="35"  fill="#F59E0B" />
    <rect x="180" y="134" width="160" height="21"  fill="#7C3AED" />
  </g>
  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="260" y="397">Function A</text>
    <text x="260" y="413" font-weight="500" font-size="12" fill="#EAECEE">RC = 400</text>

    <text x="260" y="257">Function B</text>
    <text x="260" y="273" font-weight="500" font-size="12" fill="#EAECEE">RC = 400</text>

    <text x="260" y="177">Function C</text>
    <text x="260" y="189" font-weight="500" font-size="11" fill="#FDF2D6">PC = 100</text>

    <text x="260" y="149" font-size="11">D, E and F - UR = 60</text>
  </g>
  <text x="260" y="495" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="middle">Before spike</text>
  <text x="260" y="515" font-size="13" fill="#7F8C8D" text-anchor="middle">Claimed = 960</text>

  <!-- =====================================================================
       BAR 2 — During spike (Claimed = 1,110, 110 throttled)
       x range: 440..600, center 520
       RC(A)=400:      y=330..470
       RC(B)=400:      y=190..330
       PC(C)=100:      y=155..190
       UR (still)=60:  y=134..155       (purple — 60 still running)
       Served=40:      y=120..134       (teal — filled the gap)
       Throttled=110:  y=81.5..120      (red — exceeds limit, above dashed line)
       ===================================================================== -->
  <g stroke="#ffffff" stroke-width="1.5">
    <rect x="440" y="330" width="160" height="140" fill="#8C9298" />
    <rect x="440" y="190" width="160" height="140" fill="#A8ADb3" />
    <rect x="440" y="155" width="160" height="35"  fill="#F59E0B" />
    <rect x="440" y="134" width="160" height="21"  fill="#7C3AED" />
    <rect x="440" y="120" width="160" height="14"  fill="#14B8A6" />
    <rect x="440" y="81.5" width="160" height="38.5" fill="#DC2626" />
  </g>
  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="520" y="397">Function A</text>
    <text x="520" y="413" font-weight="500" font-size="12" fill="#EAECEE">RC = 400</text>

    <text x="520" y="257">Function B</text>
    <text x="520" y="273" font-weight="500" font-size="12" fill="#EAECEE">RC = 400</text>

    <text x="520" y="177">Function C</text>
    <text x="520" y="189" font-weight="500" font-size="11" fill="#FDF2D6">PC = 100</text>

    <text x="520" y="149" font-size="11">D, E and F</text>

    <text x="520" y="106" font-size="11">G, H and I</text>
  </g>
  <text x="520" y="495" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="middle">During spike (+150 from G, H and I)</text>
  <text x="520" y="515" font-size="13" font-weight="700" fill="#DC2626" text-anchor="middle">110 throttled</text>

  <!-- Callouts on the right, pointing to the "During spike" bar -->
  <g font-size="14" font-weight="bold">
    <!-- Throttled -->
    <polyline points="600,100 640,100" fill="none" stroke="#DC2626" stroke-width="1.5" />
    <text x="648" y="105" fill="#DC2626">G, H and I - 110 throttled</text>

    <!-- Limit label -->
    <text x="805" y="125" fill="#2C3E50">Limit = 1,000</text>

    <!-- Served (40 from the previously-available gap) -->
    <polyline points="600,127 640,140" fill="none" stroke="#0F9488" stroke-width="1.5" />
    <text x="648" y="145" fill="#0F9488">G, H and I - +40 served</text>

    <!-- 60 still running (the original UR) -->
    <polyline points="600,145 640,170" fill="none" stroke="#7C3AED" stroke-width="1.5" />
    <text x="648" y="175" fill="#7C3AED">D, E and F - 60 still running</text>
  </g>

  <!-- Formula box -->
  <rect x="50" y="540" width="1060" height="55" rx="6" fill="#F4F4F5" />
  <text x="70" y="573" font-family="'Courier New', Courier, monospace" font-size="16" fill="#1F2937">150 requested − 40 available = <tspan font-weight="bold">110 throttled</tspan></text>

  <!-- Legend row 1 -->
  <g font-size="14" font-weight="500" fill="#2C3E50">
    <rect x="50" y="625" width="18" height="18" rx="3" fill="#8C9298" />
    <text x="78" y="639">Reserved Concurrency (RC)</text>

    <rect x="305" y="625" width="18" height="18" rx="3" fill="#F59E0B" />
    <text x="333" y="639">Provisioned Concurrency (PC)</text>

    <rect x="580" y="625" width="18" height="18" rx="3" fill="#7C3AED" />
    <text x="608" y="639">Unreserved Executions</text>

    <rect x="800" y="625" width="18" height="18" rx="3" fill="#14B8A6" />
    <text x="828" y="639">Newly Served (from spike)</text>
  </g>
  <!-- Legend row 2 -->
  <g font-size="14" font-weight="500" fill="#2C3E50">
    <rect x="50" y="660" width="18" height="18" rx="3" fill="#DC2626" />
    <text x="78" y="674">Throttled (exceeds limit)</text>

    <line x1="270" y1="669" x2="310" y2="669" stroke="#2C3E50" stroke-width="2" stroke-dasharray="6,4" />
    <text x="318" y="674">Account Limit</text>
  </g>
</svg>
