<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" width="100%" height="100%" style="background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <text x="50" y="60" font-size="22" font-weight="700" fill="#2C3E50">Scenario 2 - Account Concurrency Limit: 1,000</text>

  <!-- Y axis -->
  <line x1="120" y1="120" x2="120" y2="470" stroke="#2C3E50" stroke-width="2" />
  <!-- X axis -->
  <line x1="120" y1="470" x2="420" y2="470" stroke="#2C3E50" stroke-width="2" />

  <!-- Y axis labels: 0..1000 -> 470..120 -->
  <g font-size="14" fill="#555" text-anchor="end">
    <text x="105" y="475">0</text>
    <text x="105" y="405">200</text>
    <text x="105" y="335">400</text>
    <text x="105" y="265">600</text>
    <text x="105" y="195">800</text>
    <text x="105" y="125">1,000</text>
  </g>
  <g stroke="#2C3E50" stroke-width="1">
    <line x1="115" y1="400" x2="120" y2="400" />
    <line x1="115" y1="330" x2="120" y2="330" />
    <line x1="115" y1="260" x2="120" y2="260" />
    <line x1="115" y1="190" x2="120" y2="190" />
    <line x1="115" y1="120" x2="120" y2="120" />
  </g>

  <!-- Account limit dashed line at y=120 (1,000) -->
  <line x1="120" y1="120" x2="420" y2="120" stroke="#2C3E50" stroke-width="2" stroke-dasharray="6,4" />

  <!-- Stacked bar: unit = 0.35 px/concurrency, bar width 200 starting x=180
       RC(A)=400: y=330..470
       RC(B)=400: y=190..330
       PC(C)=100: y=155..190
       UR=60:     y=134..155
       Available=40: y=120..134 -->
  <g stroke="#ffffff" stroke-width="1.5">
    <rect x="180" y="330" width="200" height="140" fill="#8C9298" />
    <rect x="180" y="190" width="200" height="140" fill="#A8ADb3" />
    <rect x="180" y="155" width="200" height="35"  fill="#F59E0B" />
    <rect x="180" y="134" width="200" height="21"  fill="#7C3AED" />
  </g>

  <!-- In-bar labels -->
  <g font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <text x="280" y="397">Function A</text>
    <text x="280" y="415" font-weight="500" font-size="13" fill="#EAECEE">RC = 400</text>

    <text x="280" y="257">Function B</text>
    <text x="280" y="275" font-weight="500" font-size="13" fill="#EAECEE">RC = 400</text>

    <text x="280" y="169">Function C</text>
    <text x="280" y="186" font-weight="500" font-size="12" fill="#FDF2D6">PC = 100</text>

    <text x="280" y="149" font-size="11">D, E and F - UR = 60</text>
  </g>

  <!-- Right-side callouts -->
  <g font-size="14" font-weight="bold">
    <text x="440" y="100" fill="#2C3E50" font-size="15">Limit = 1,000</text>
    <polyline points="432,95 400,120" fill="none" stroke="#2C3E50" stroke-width="1" />

    <!-- Available gap (y=120..134) marked with a green "]" bracket -->
    <path d="M 380,120 L 395,120 L 395,134 L 380,134" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="395,127 415,127" fill="none" stroke="#22C55E" stroke-width="1.5" />
    <text x="420" y="132" fill="#22C55E">40 available</text>

    <!-- Unreserved (UR=60) callout -->
    <polyline points="380,145 415,157" fill="none" stroke="#7C3AED" stroke-width="1.5" />
    <text x="420" y="162" fill="#7C3AED">D, E and F - UR = 60</text>

    <!-- Provisioned (PC=100) callout -->
    <polyline points="380,172 415,192" fill="none" stroke="#F59E0B" stroke-width="1.5" />
    <text x="420" y="197" fill="#F59E0B">Function C - PC = 100</text>
  </g>

  <!-- Claimed label under the bar -->
  <text x="280" y="505" font-size="16" font-weight="bold" fill="#C0392B" text-anchor="middle">Claimed = 960</text>

  <!-- Formula box -->
  <rect x="50" y="540" width="980" height="55" rx="6" fill="#F4F4F5" />
  <text x="70" y="573" font-family="'Courier New', Courier, monospace" font-size="16" fill="#1F2937">ClaimedAccountConcurrency = 60 (unreserved) + 900 (allocated: 400+400+100) = <tspan font-weight="bold">960</tspan></text>

  <!-- Legend -->
  <g font-size="15" font-weight="500" fill="#2C3E50">
    <rect x="50" y="625" width="18" height="18" rx="3" fill="#8C9298" />
    <text x="78" y="639">Reserved Concurrency (RC)</text>

    <rect x="305" y="625" width="18" height="18" rx="3" fill="#F59E0B" />
    <text x="333" y="639">Provisioned Concurrency (PC)</text>

    <rect x="580" y="625" width="18" height="18" rx="3" fill="#7C3AED" />
    <text x="608" y="639">Unreserved Executions</text>

    <rect x="800" y="625" width="18" height="18" rx="3" fill="#22C55E" />
    <text x="828" y="639">Available</text>

    <line x1="915" y1="634" x2="955" y2="634" stroke="#2C3E50" stroke-width="2" stroke-dasharray="6,4" />
    <text x="963" y="639">Account Limit</text>
  </g>
</svg>
